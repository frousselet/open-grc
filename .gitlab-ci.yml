# Run MR pipelines when a MR exists, branch pipelines otherwise, and tag pipelines on tags.
# This prevents duplicate pipelines (branch + MR) for the same commit.
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - quality
  - security
  - test
  - deploy

# ---------------------------------------------------------------------------
# Templates
# ---------------------------------------------------------------------------
.not-tags:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success

# ---------------------------------------------------------------------------
# Quality - Syntax : ruff lint (syntax errors, undefined names)
# ---------------------------------------------------------------------------
syntax:
  extends: .not-tags
  stage: quality
  image: python:slim
  cache:
    key: pip-ruff
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - pip install --quiet ruff
  script:
    - ruff check .

# ---------------------------------------------------------------------------
# Quality - Translations : verify .po files compile without errors
# ---------------------------------------------------------------------------
translations:
  extends: .not-tags
  stage: quality
  image: python:slim
  cache:
    key: pip-django
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gettext
    - pip install --quiet Django
  script:
    - django-admin compilemessages --locale=fr --locale=en

# ---------------------------------------------------------------------------
# Security - Vulnerabilities : Trivy filesystem scan
# ---------------------------------------------------------------------------
vulnerabilities:
  extends: .not-tags
  stage: security
  image: python:slim
  cache:
    key: pip-full
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    TRIVY_NO_PROGRESS: "true"
  before_script:
    - pip install --quiet -r requirements.txt
    - pip freeze > requirements.txt
    - apt-get update && apt-get install -y --no-install-recommends curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
    - curl -sfL -o /tmp/gitlab.tpl https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/gitlab.tpl
  script:
    - cat requirements.txt
    - trivy fs --exit-code 0 --scanners vuln --format table .
    - trivy fs --exit-code 0 --scanners vuln --format template --template "@/tmp/gitlab.tpl" -o gl-container-scanning-report.json .
  artifacts:
    when: always
    reports:
      container_scanning: gl-container-scanning-report.json
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Test - Templates
# ---------------------------------------------------------------------------
.test-base:
  extends: .not-tags
  stage: test
  image: python:slim
  cache:
    key: pip-full
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
    PYTHONUNBUFFERED: "1"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gettext
    - pip install --quiet -r requirements.txt
    - python manage.py compilemessages

# ---------------------------------------------------------------------------
# Test - Unit : one parallel job per app directory
# ---------------------------------------------------------------------------
unit:
  extends: .test-base
  parallel:
    matrix:
      - TEST_SUITE: [accounts, assets, compliance, context, core, helpers, mcp, reports, risks]
  script:
    - pytest -x -v --tb=short --cov --junitxml=report.xml $TEST_SUITE/
  after_script:
    - mv .coverage .coverage.$TEST_SUITE 2>/dev/null || true
  artifacts:
    when: always
    paths:
      - .coverage.*
    reports:
      junit: report.xml
    expire_in: 30 days

# ---------------------------------------------------------------------------
# Test - Coverage : combine reports from parallel unit jobs
# ---------------------------------------------------------------------------
coverage:
  extends: .test-base
  needs:
    - unit
  script:
    - coverage combine
    - coverage report --show-missing
    - coverage xml -o coverage.xml
  artifacts:
    when: always
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days
  coverage: '/^TOTAL.+?(\d+(?:\.\d+)?)%$/'

# ---------------------------------------------------------------------------
# Deploy - Docker dev image : build & push on merge to main
# ---------------------------------------------------------------------------
docker-dev:
  stage: deploy
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      IMAGE="${CI_REGISTRY_IMAGE}"
      echo "dev" > version.txt
      docker build --build-arg APP_VERSION="dev" -t "${IMAGE}:dev" .
      docker push "${IMAGE}:dev"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ---------------------------------------------------------------------------
# Deploy - Docker release image : build & push on version tags (v*)
# ---------------------------------------------------------------------------
docker-release:
  stage: deploy
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      # Extract version from tag (strip leading 'v')
      VERSION="${CI_COMMIT_TAG#v}"
      MAJOR="$(echo "$VERSION" | cut -d. -f1)"
      MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
      IMAGE="${CI_REGISTRY_IMAGE}"

      echo "$VERSION" > version.txt

      docker build \
        --build-arg APP_VERSION="$VERSION" \
        -t "${IMAGE}:${VERSION}" \
        -t "${IMAGE}:${MINOR}" \
        -t "${IMAGE}:${MAJOR}" \
        -t "${IMAGE}:latest" \
        .

      docker push "${IMAGE}:${VERSION}"
      docker push "${IMAGE}:${MINOR}"
      docker push "${IMAGE}:${MAJOR}"
      docker push "${IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
