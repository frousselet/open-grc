stages:
  - test
  - docker

# ---------------------------------------------------------------------------
# Tests - runs on pushes to main and on merge requests
# ---------------------------------------------------------------------------
test:
  stage: test
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gettext
    - pip install -r requirements.txt
  script:
    - python manage.py compilemessages
    - pytest -x -v --tb=short --cov --cov-report=term-missing
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ---------------------------------------------------------------------------
# Docker build & push - runs on version tags (v*)
# ---------------------------------------------------------------------------
docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      # Extract version from tag (strip leading 'v')
      VERSION="${CI_COMMIT_TAG#v}"
      MAJOR="$(echo "$VERSION" | cut -d. -f1)"
      MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
      IMAGE="${CI_REGISTRY_IMAGE}"

      echo "$VERSION" > version.txt

      docker build \
        --build-arg APP_VERSION="$VERSION" \
        -t "${IMAGE}:${VERSION}" \
        -t "${IMAGE}:${MINOR}" \
        -t "${IMAGE}:${MAJOR}" \
        -t "${IMAGE}:latest" \
        .

      docker push "${IMAGE}:${VERSION}"
      docker push "${IMAGE}:${MINOR}"
      docker push "${IMAGE}:${MAJOR}"
      docker push "${IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
