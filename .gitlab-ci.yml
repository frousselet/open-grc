stages:
  - quality
  - test
  - deploy

# ---------------------------------------------------------------------------
# Templates
# ---------------------------------------------------------------------------
.not-tags:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

# ---------------------------------------------------------------------------
# Quality - Syntax : ruff lint (syntax errors, undefined names)
# ---------------------------------------------------------------------------
syntax:
  extends: .not-tags
  stage: quality
  image: python:3.12-slim
  cache:
    key: pip-ruff
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - pip install --quiet "ruff>=0.9,<1"
  script:
    - ruff check .

# ---------------------------------------------------------------------------
# Quality - Translations : verify .po files compile without errors
# ---------------------------------------------------------------------------
translations:
  extends: .not-tags
  stage: quality
  image: python:3.12-slim
  cache:
    key: pip-django
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gettext
    - pip install --quiet "Django>=5.2,<5.3"
  script:
    - django-admin compilemessages --locale=fr --locale=en

# ---------------------------------------------------------------------------
# Test - Unit : pytest with coverage
# ---------------------------------------------------------------------------
unit:
  extends: .not-tags
  stage: test
  image: python:3.12-slim
  cache:
    key: pip-full
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends gettext
    - pip install --quiet -r requirements.txt
  script:
    - python manage.py compilemessages
    - pytest -x -v --tb=short --cov --cov-report=term-missing --cov-report=xml:coverage.xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 30 days
  coverage: '/^TOTAL.+?(\d+(?:\.\d+)?)%$/'

# ---------------------------------------------------------------------------
# Deploy - Docker image : build & push on version tags (v*)
# ---------------------------------------------------------------------------
docker-image:
  stage: deploy
  image: docker:27
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      # Extract version from tag (strip leading 'v')
      VERSION="${CI_COMMIT_TAG#v}"
      MAJOR="$(echo "$VERSION" | cut -d. -f1)"
      MINOR="$(echo "$VERSION" | cut -d. -f1-2)"
      IMAGE="${CI_REGISTRY_IMAGE}"

      echo "$VERSION" > version.txt

      docker build \
        --build-arg APP_VERSION="$VERSION" \
        -t "${IMAGE}:${VERSION}" \
        -t "${IMAGE}:${MINOR}" \
        -t "${IMAGE}:${MAJOR}" \
        -t "${IMAGE}:latest" \
        .

      docker push "${IMAGE}:${VERSION}"
      docker push "${IMAGE}:${MINOR}"
      docker push "${IMAGE}:${MAJOR}"
      docker push "${IMAGE}:latest"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
