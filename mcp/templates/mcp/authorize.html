{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% trans "Authorize — Fairway" %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
        rel="stylesheet">
  <script>
    (function(){
      var m = window.matchMedia('(prefers-color-scheme: dark)');
      function apply(dark) {
        document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
      }
      apply(m.matches);
      m.addEventListener('change', function(e) { apply(e.matches); });
    })();
  </script>
  <style>
    :root {
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-soft: #eef2ff;
      --accent-glow: rgba(99,102,241,.2);
      --surface: #ffffff;
      --border-light: #e2e8f0;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --radius-lg: 1.25rem;
      --radius-md: .75rem;
      --radius-sm: .5rem;
      --ease-out-expo: cubic-bezier(.16,1,.3,1);
    }
    [data-bs-theme="dark"] {
      --surface: #1a2332;
      --border-light: #2d3d50;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #818cf8;
      --accent-soft: rgba(99,102,241,.1);
      --accent-glow: rgba(129,140,248,.15);
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5 0%, #6d28d9 50%, #7c3aed 100%);
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }
    [data-bs-theme="dark"] body {
      background: linear-gradient(135deg, #0c0a1d 0%, #1e1b4b 40%, #312e81 70%, #1e1b4b 100%);
    }
    .auth-wrapper {
      max-width: 420px;
      width: 100%;
      position: relative;
      z-index: 1;
      animation: fadeIn .5s var(--ease-out-expo);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-light);
      box-shadow: 0 24px 64px rgba(0,0,0,.18), 0 8px 24px rgba(0,0,0,.1);
      padding: 2.5rem 2rem 2rem;
    }
    [data-bs-theme="dark"] .auth-card {
      box-shadow: 0 24px 64px rgba(0,0,0,.45), 0 8px 24px rgba(0,0,0,.3);
      border-color: rgba(255,255,255,.06);
    }
    .auth-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .625rem;
      margin-bottom: .5rem;
    }
    .auth-brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: 0 4px 12px var(--accent-glow);
    }
    .auth-brand-icon svg { width: 100%; height: 100%; }
    .logo-dark { display: none; }
    .logo-light { display: inline; }
    [data-bs-theme="dark"] .logo-dark { display: inline; }
    [data-bs-theme="dark"] .logo-light { display: none; }
    .auth-brand-text {
      font-weight: 700;
      font-size: 1.3125rem;
      color: var(--text-primary);
      letter-spacing: -.025em;
    }
    .auth-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: .8125rem;
      margin-bottom: 1.5rem;
    }
    .auth-info {
      background: var(--accent-soft);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .auth-info-label {
      font-size: .75rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .25rem;
    }
    .auth-info-value {
      font-size: .875rem;
      color: var(--text-primary);
      font-weight: 500;
    }
    .auth-user {
      text-align: center;
      color: var(--text-secondary);
      font-size: .8125rem;
      margin-bottom: 1.5rem;
    }
    .auth-user strong {
      color: var(--text-primary);
    }
    .btn-authorize {
      background: var(--accent);
      border: none;
      color: #fff;
      border-radius: var(--radius-sm);
      padding: .625rem;
      font-weight: 600;
      font-size: .8125rem;
      width: 100%;
      transition: all .2s var(--ease-out-expo);
      box-shadow: 0 1px 3px var(--accent-glow);
    }
    .btn-authorize:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(99,102,241,.3);
      color: #fff;
    }
    .btn-deny {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      padding: .625rem;
      font-weight: 600;
      font-size: .8125rem;
      width: 100%;
      transition: all .2s var(--ease-out-expo);
    }
    .btn-deny:hover {
      background: rgba(239,68,68,.1);
      border-color: #ef4444;
      color: #ef4444;
    }
    ::selection { background: var(--accent-soft); color: var(--accent); }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-brand">
        <span class="auth-brand-icon">
          <svg class="logo-light" viewBox="0 0 512 512"><defs><linearGradient id="mcBgL" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="50%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient><linearGradient id="mcFL" x1="0%" y1="0%" x2="60%" y2="100%"><stop offset="0%" stop-color="#fff"/><stop offset="50%" stop-color="#f0edff"/><stop offset="100%" stop-color="#e0dafb"/></linearGradient></defs><rect width="512" height="512" fill="url(#mcBgL)"/><path d="M198 88h164a38 38 0 010 76H236v54h66a38 38 0 010 76h-66v86a38 38 0 01-76 0V126a38 38 0 0138-38z" fill="url(#mcFL)"/><circle cx="400" cy="126" r="24" fill="#f0abfc"/><circle cx="340" cy="256" r="24" fill="#a5b4fc"/></svg>
          <svg class="logo-dark" viewBox="0 0 512 512"><defs><linearGradient id="mcBgD" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0c1222"/><stop offset="40%" stop-color="#131a3a"/><stop offset="100%" stop-color="#0e0f24"/></linearGradient><linearGradient id="mcFD" x1="0%" y1="0%" x2="60%" y2="100%"><stop offset="0%" stop-color="#818cf8"/><stop offset="50%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4f46e5"/></linearGradient></defs><rect width="512" height="512" fill="url(#mcBgD)"/><circle cx="68" cy="52" r="2" fill="#e0e7ff" opacity=".8"/><circle cx="432" cy="38" r="2.2" fill="#c7d2fe" opacity=".9"/><circle cx="462" cy="178" r="1.8" fill="#e0e7ff" opacity=".7"/><circle cx="88" cy="392" r="2" fill="#e0e7ff" opacity=".75"/><circle cx="448" cy="340" r="1.8" fill="#c7d2fe" opacity=".65"/><path d="M198 88h164a38 38 0 010 76H236v54h66a38 38 0 010 76h-66v86a38 38 0 01-76 0V126a38 38 0 0138-38z" fill="url(#mcFD)"/><circle cx="400" cy="126" r="24" fill="#e879f9" opacity=".85"/><circle cx="340" cy="256" r="24" fill="#a5b4fc" opacity=".85"/></svg>
        </span>
        <span class="auth-brand-text">Fairway</span>
      </div>
      <p class="auth-subtitle">{% trans "An application is requesting access to your account" %}</p>

      <div class="auth-info">
        <div class="auth-info-label">{% trans "Application" %}</div>
        <div class="auth-info-value">{{ app.name }}</div>
      </div>

      <div class="auth-user">
        {% blocktrans with email=request.user.email %}Signed in as <strong>{{ email }}</strong>{% endblocktrans %}
      </div>

      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="client_id" value="{{ client_id }}">
        <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
        <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
        <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}">
        <input type="hidden" name="state" value="{{ state }}">
        <input type="hidden" name="scope" value="{{ scope }}">

        <div class="d-grid gap-2">
          <button type="submit" name="action" value="approve" class="btn btn-authorize">
            <i class="bi bi-check-lg me-1"></i> {% trans "Authorize" %}
          </button>
          <button type="submit" name="action" value="deny" class="btn btn-deny">
            {% trans "Deny" %}
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
</body>
</html>
