<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Fairway - Dark version (v2, with stars, artifact-free)
    Luminous indigo F on deep navy sky with stars.
  -->
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222" />
      <stop offset="40%" stop-color="#131a3a" />
      <stop offset="100%" stop-color="#0e0f24" />
    </linearGradient>

    <!-- F fill - luminous indigo -->
    <linearGradient id="fFillD" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <!-- Shine overlay for dark -->
    <linearGradient id="shineD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.45" />
      <stop offset="35%" stop-color="#a5b4fc" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </linearGradient>

    <!-- Ambient glow behind F -->
    <filter id="ambientD" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" />
    </filter>

    <!-- Shadow -->
    <filter id="fShadowD" x="-6%" y="-4%" width="112%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <!-- Buoy glow (stronger for dark bg) -->
    <filter id="buoyGlowD" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="b" />
      <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>

    <!-- Star twinkle -->
    <filter id="twinkle">
      <feGaussianBlur stdDeviation="1" />
    </filter>

    <!-- Unified F clip -->
    <clipPath id="fClipD">
      <path d="
        M 198,88 L 362,88 A 38,38 0 0 1 400,126 A 38,38 0 0 1 362,164
        L 236,164 L 236,218
        L 302,218 A 38,38 0 0 1 340,256 A 38,38 0 0 1 302,294
        L 236,294 L 236,380
        A 38,38 0 0 1 198,418 A 38,38 0 0 1 160,380
        L 160,126 A 38,38 0 0 1 198,88 Z
      " />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgD)" />

  <!-- Stars -->
  <!-- Large bright stars -->
  <circle cx="68" cy="52" r="2" fill="#e0e7ff" opacity="0.8" />
  <circle cx="432" cy="38" r="2.2" fill="#c7d2fe" opacity="0.9" />
  <circle cx="462" cy="178" r="1.8" fill="#e0e7ff" opacity="0.7" />
  <circle cx="52" cy="210" r="1.6" fill="#ddd6fe" opacity="0.6" />
  <circle cx="88" cy="392" r="2" fill="#e0e7ff" opacity="0.75" />
  <circle cx="448" cy="340" r="1.8" fill="#c7d2fe" opacity="0.65" />
  <circle cx="108" cy="118" r="1.5" fill="#e0e7ff" opacity="0.5" />
  <circle cx="420" cy="432" r="1.6" fill="#ddd6fe" opacity="0.55" />

  <!-- Medium stars -->
  <circle cx="38" cy="140" r="1.2" fill="#c7d2fe" opacity="0.5" />
  <circle cx="475" cy="92" r="1.3" fill="#e0e7ff" opacity="0.55" />
  <circle cx="385" cy="460" r="1.2" fill="#ddd6fe" opacity="0.45" />
  <circle cx="72" cy="320" r="1.1" fill="#e0e7ff" opacity="0.4" />
  <circle cx="456" cy="260" r="1" fill="#c7d2fe" opacity="0.45" />
  <circle cx="42" cy="460" r="1.3" fill="#e0e7ff" opacity="0.5" />
  <circle cx="480" cy="420" r="1.1" fill="#ddd6fe" opacity="0.4" />
  <circle cx="330" cy="460" r="1.2" fill="#c7d2fe" opacity="0.35" />

  <!-- Small faint stars -->
  <circle cx="92" cy="68" r="0.8" fill="#a5b4fc" opacity="0.35" />
  <circle cx="140" cy="42" r="0.7" fill="#c7d2fe" opacity="0.3" />
  <circle cx="310" cy="32" r="0.9" fill="#e0e7ff" opacity="0.35" />
  <circle cx="200" cy="465" r="0.8" fill="#c7d2fe" opacity="0.3" />
  <circle cx="490" cy="150" r="0.7" fill="#ddd6fe" opacity="0.25" />
  <circle cx="28" cy="280" r="0.8" fill="#e0e7ff" opacity="0.3" />
  <circle cx="470" cy="50" r="0.7" fill="#a5b4fc" opacity="0.3" />
  <circle cx="60" cy="440" r="0.9" fill="#c7d2fe" opacity="0.3" />
  <circle cx="340" cy="48" r="0.6" fill="#e0e7ff" opacity="0.25" />
  <circle cx="130" cy="460" r="0.7" fill="#ddd6fe" opacity="0.25" />

  <!-- Twinkling cross-stars (4-point) on the brightest ones -->
  <g opacity="0.3">
    <line x1="68" y1="46" x2="68" y2="58" stroke="#e0e7ff" stroke-width="0.6" stroke-linecap="round" />
    <line x1="62" y1="52" x2="74" y2="52" stroke="#e0e7ff" stroke-width="0.6" stroke-linecap="round" />
  </g>
  <g opacity="0.35">
    <line x1="432" y1="31" x2="432" y2="45" stroke="#c7d2fe" stroke-width="0.7" stroke-linecap="round" />
    <line x1="425" y1="38" x2="439" y2="38" stroke="#c7d2fe" stroke-width="0.7" stroke-linecap="round" />
  </g>
  <g opacity="0.25">
    <line x1="88" y1="387" x2="88" y2="397" stroke="#e0e7ff" stroke-width="0.5" stroke-linecap="round" />
    <line x1="83" y1="392" x2="93" y2="392" stroke="#e0e7ff" stroke-width="0.5" stroke-linecap="round" />
  </g>

  <!-- Ambient glow behind F -->
  <path d="
    M 198,88 L 362,88 A 38,38 0 0 1 400,126 A 38,38 0 0 1 362,164
    L 236,164 L 236,218
    L 302,218 A 38,38 0 0 1 340,256 A 38,38 0 0 1 302,294
    L 236,294 L 236,380
    A 38,38 0 0 1 198,418 A 38,38 0 0 1 160,380
    L 160,126 A 38,38 0 0 1 198,88 Z
  " fill="#6366f1" opacity="0.25" filter="url(#ambientD)" />

  <!-- F shape - single unified path -->
  <path d="
    M 198,88 L 362,88 A 38,38 0 0 1 400,126 A 38,38 0 0 1 362,164
    L 236,164 L 236,218
    L 302,218 A 38,38 0 0 1 340,256 A 38,38 0 0 1 302,294
    L 236,294 L 236,380
    A 38,38 0 0 1 198,418 A 38,38 0 0 1 160,380
    L 160,126 A 38,38 0 0 1 198,88 Z
  " fill="url(#fFillD)" filter="url(#fShadowD)" />

  <!-- Shine overlay clipped to F -->
  <g clip-path="url(#fClipD)">
    <ellipse cx="185" cy="115" rx="135" ry="195" fill="url(#shineD)" />
  </g>

  <!-- Port buoy (top right - pink glow) -->
  <circle cx="400" cy="126" r="24" fill="#e879f9" opacity="0.85" filter="url(#buoyGlowD)" />
  <circle cx="400" cy="126" r="10" fill="#fae8ff" opacity="0.5" />
  <circle cx="400" cy="126" r="4.5" fill="#ffffff" opacity="0.35" />

  <!-- Starboard buoy (middle right - indigo glow) -->
  <circle cx="340" cy="256" r="24" fill="#a5b4fc" opacity="0.85" filter="url(#buoyGlowD)" />
  <circle cx="340" cy="256" r="10" fill="#e0e7ff" opacity="0.5" />
  <circle cx="340" cy="256" r="4.5" fill="#ffffff" opacity="0.35" />

  <!-- Waves -->
  <path d="M 100 452 Q 175 434 256 452 Q 337 470 412 452"
        fill="none" stroke="#818cf8" stroke-width="2" opacity="0.12" stroke-linecap="round" />
  <path d="M 120 472 Q 195 454 256 472 Q 317 490 392 472"
        fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.07" stroke-linecap="round" />
</svg>
