{% load i18n %}
<form method="get" class="mb-3">
  {# Preserve existing filter params (status, type, etc.) but not q/page #}
  {% for key, value in request.GET.items %}
    {% if key != "q" and key != "page" %}
      <input type="hidden" name="{{ key }}" value="{{ value }}">
    {% endif %}
  {% endfor %}
  <div class="input-group">
    <span class="input-group-text bg-white border-end-0"><i class="bi bi-search" style="opacity:.5"></i></span>
    <input type="text" name="q" class="form-control border-start-0 ps-0"
           placeholder="{% trans 'Search…' %}"
           value="{{ search_query }}"
           aria-label="{% trans 'Search' %}">
    {% if search_query %}
      <a href="?{% for key, value in request.GET.items %}{% if key != 'q' and key != 'page' %}{{ key }}={{ value }}&{% endif %}{% endfor %}"
         class="btn btn-outline-secondary" title="{% trans 'Clear' %}">
        <i class="bi bi-x-lg"></i>
      </a>
    {% endif %}
  </div>
</form>
