{% load i18n %}
<div class="offcanvas-header">
  <h5 class="offcanvas-title">
    {% block modal_title_icon %}<span class="drawer-title-icon"><i class="bi bi-pencil-square"></i></span>{% endblock %}
    {{ modal_title }}
  </h5>
  <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="{% trans 'Close' %}"></button>
</div>
<form method="post" hx-post="{{ request.path }}" hx-target="#drawer-form-content" hx-swap="innerHTML" class="d-flex flex-column flex-grow-1 overflow-hidden">
  {% csrf_token %}
  <div class="drawer-body">
    {% block modal_form_fields %}{% endblock %}
  </div>
  <div class="drawer-footer">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="offcanvas">{% trans "Cancel" %}</button>
    <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>{% trans "Save" %}</button>
  </div>
</form>
