{# Rendered by {% user_badge %} inclusion tag - do not include directly. #}
<span class="user-badge {% if block %}d-flex{% else %}d-inline-flex{% endif %} align-items-center" style="gap:.4rem;white-space:nowrap;vertical-align:middle">
  {% if u.avatar %}<img src="{{ avatar_src }}" alt="" style="width:{{ sz }}px;height:{{ sz }}px;border-radius:50%;object-fit:cover;flex-shrink:0;vertical-align:middle;border:2px solid var(--border-light)">{% else %}<span class="d-inline-flex align-items-center justify-content-center" style="width:{{ sz }}px;height:{{ sz }}px;border-radius:50%;background:linear-gradient(135deg,var(--accent-soft),color-mix(in srgb,var(--accent) 18%,transparent));color:var(--accent);font-size:{{ font_size }};font-weight:600;letter-spacing:.02em;flex-shrink:0;line-height:1">{{ initial }}</span>{% endif %}{% if show_name %}{% if link %}<a href="{% url 'accounts:user-detail' u.pk %}" style="color:var(--accent);text-decoration:none;font-weight:500">{{ u.display_name }}</a>{% else %}<span>{{ u.display_name }}</span>{% endif %}{% endif %}
</span>
